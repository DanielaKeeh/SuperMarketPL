<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrescaVida</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/map.css">
  <link rel="stylesheet" href="/css/section.css">
  <link rel="stylesheet" href="/css/office.css">
</head>
<body>
<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" data-link="/">
      <div class="sidebar-logo-icon">🌿</div>
      <span class="sidebar-logo-text">FrescaVida</span>
    </a>
    <div class="sidebar-curator">
      <div class="sidebar-curator-avatar">KD</div>
      <div class="sidebar-curator-info">
        <span class="sidebar-curator-name">The Curator</span>
        <span class="sidebar-curator-role">Premium Fresh Goods</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-link active" data-link="/">
        <span class="nav-link-icon">🗺️</span> Store Map
      </button>
      <button class="nav-link" data-link="/office">
        <span class="nav-link-icon">💼</span> Office
      </button>
    </nav>
    <div class="sidebar-seasonal">
      <span class="sidebar-seasonal-label">Curated Daily</span>
      <span class="sidebar-seasonal-title">The Curator's Choice: Seasonal Greens</span>
      <button class="sidebar-seasonal-btn" data-link="/section/frutas">
        Shop Seasonal
      </button>
    </div>
  </aside>
  <!-- CONTENIDO PRINCIPAL -->
  <div class="main-content">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-back" id="topbar-back">←</button>
        <button class="hamburger-btn" id="menu-btn">☰</button>
        <div class="breadcrumb">
        <span class="breadcrumb-home" data-link="/">HOME</span>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="breadcrumb-current">NAVIGATION HUB</span>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="search-input"
            placeholder="Search the curator's selection..."
            autocomplete="off">
          <button class="search-clear" id="search-clear">✕</button>
          <div class="search-results" id="search-results"></div>
        </div>
      </div>
    </div>
    <!-- APP — solo este div cambia con cada navegación -->
    <div id="app"></div>
  </div>
</div>
<!-- Overlay mobile -->
<div id="sidebar-overlay"></div>
<script src="/js/app.js"></script>
</body>
</html>
