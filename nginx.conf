server {
    listen 80;

    root /usr/share/nginx/html;

    # Archivos estáticos — nginx los sirve directo
    location /css/ {
        try_files $uri =404;
    }

    location /js/ {
        try_files $uri =404;
    }

    # API → Prolog
    location /api/ {
        proxy_pass http://prolog:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vistas SSR → Prolog
    location /views/ {
        proxy_pass http://prolog:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Todo lo demás → index.html (SPA)
    location / {
        try_files $uri /index.html;
    }
}